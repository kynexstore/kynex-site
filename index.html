<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KYNEX | Loja Gamer</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
}

header {
    background: #ff6a00;
    padding: 30px;
    text-align: center;
}

header h1 {
    font-size: 45px;
    margin: 0;
}

header p {
    margin-top: 10px;
}

.container {
    padding: 30px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
}

.produto {
    background: #171717;
    border-radius: 15px;
    padding: 20px;
    text-align: center;
}

.produto img {
    width: 100%;
    border-radius: 10px;
}

.produto h2 {
    color: #ff6a00;
}

button {
    background: #ff6a00;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #ff8500;
}

footer {
    text-align: center;
    padding: 20px;
    color: gray;
}
</style>

</head>

<body>

<header>
<h1>KYNEX</h1>
<p>Periféricos gamers para elevar seu setup</p>
</header>


<div class="container">

<div class="produto">
<img src="https://via.placeholder.com/300">
<h2>Teclado Magnético 60%</h2>
<p>Precisão máxima para jogos FPS como Valorant.</p>
<button>Comprar</button>
</div>


<div class="produto">
<img src="https://via.placeholder.com/300">
<h2>Mouse Gamer</h2>
<p>Leve, rápido e competitivo.</p>
<button>Comprar</button>
</div>


<div class="produto">
<img src="https://via.placeholder.com/300">
<h2>Mousepad Premium</h2>
<p>Mais controle e conforto no seu setup.</p>
<button>Comprar</button>
</div>

</div>


<footer>
© 2026 KYNEX - Seu setup começa aqui
</footer>


</body>
</html>
